databases:
  - name: expense-tracker-db
    plan: free
    databaseName: expense_tracker
    user: expense_user

services:
  # ── FastAPI Backend ──────────────────────────────────────────────
  - type: web
    name: expense-tracker-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-backend.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: expense-tracker-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: PYTHON_VERSION
        value: "3.11.9"

  # ── Streamlit Frontend ───────────────────────────────────────────
  - type: web
    name: expense-tracker-frontend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-frontend.txt
    startCommand: streamlit run frontend/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: BACKEND_URL
        sync: false  # Set this to your backend's URL, e.g. https://expense-tracker-backend-xxxx.onrender.com
      - key: PYTHON_VERSION
        value: "3.11.9"
