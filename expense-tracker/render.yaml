services:
  # ── FastAPI Backend ──────────────────────────────────────────────
  - type: web
    name: expense-tracker-backend
    runtime: python
    plan: free
    healthCheckPath: /health
    rootDir: expense-tracker
    buildCommand: pip install -r requirements-backend.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: "postgresql://expense_user:f0602hTGQhWEGWGF6CWY1JE2kZvATX97@dpg-d8gskd6gvqtc738qpj5g-a/expense_tracker_htjg"
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: PYTHON_VERSION
        value: "3.11.9"

  # ── Streamlit Frontend ───────────────────────────────────────────
  - type: web
    name: expense-tracker-frontend
    runtime: python
    plan: free
    rootDir: expense-tracker
    buildCommand: pip install -r requirements-frontend.txt
    startCommand: streamlit run frontend/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: BACKEND_URL
        value: "https://expense-tracker-backend-ja4z.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.9"
